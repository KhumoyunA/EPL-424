<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EPL Stat Tracker</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="header-content">
        <div class="brand">
          <div class="title">EPL Stat Tracker</div>
        </div>

        <nav class="site-nav" aria-label="Primary">
          <button id="toggle-stat" class="toggle-button" aria-pressed="false">
            <span class="stat-label">Top Scorers</span>
          </button>
          <div class="search-wrapper">
            <form class="search-form" id="search-form">
              <input
                id="site-search"
                name="search"
                type="search"
                placeholder="Search player..."
                aria-label="Search for player"
              />
              <button type="submit" aria-label="Search">Search</button>
            </form>
            <div
              id="search-results"
              class="search-results"
              role="status"
              aria-live="polite"
            ></div>
          </div>
        </nav>
      </div>
    </header>

    <div id="data-status-bar" class="data-status-bar" hidden>
      <span id="last-updated" class="last-updated"></span>
      <span id="stale-warning" class="stale-warning" hidden></span>
    </div>

    <main class="layout">
      <section class="standings-section">
        <h2>League Standings</h2>
        <table id="standings-table" class="standings-table">
          <thead>
            <tr>
              <th>Team</th>
              <th title="Played">P</th>
              <th title="Win">W</th>
              <th title="Draw">D</th>
              <th title="Loss">L</th>
              <th title="Points">Pts</th>
            </tr>
          </thead>
          <tbody id="standings-body"></tbody>
        </table>
      </section>

      <section class="stats-section">
        <h2 id="stats-title">Top Scorers</h2>
        <table id="stats-table" class="stats-table">
          <thead>
            <tr>
              <th>Player</th>
              <th>Team</th>
              <th id="stat-column">Goals</th>
            </tr>
          </thead>
          <tbody id="stats-body"></tbody>
        </table>
      </section>
    </main>

    <footer>
      <small>EPL Stat Tracker &mdash; Data via API-Football</small>
    </footer>

    <div
      id="detail-modal"
      class="modal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="modal-title"
      hidden
    >
      <div class="modal-content">
        <header class="modal-header">
          <h2 id="modal-title"></h2>
          <button
            class="close-button"
            id="close-modal"
            aria-label="Close modal"
          >
            &times;
          </button>
        </header>
        <button
          id="modal-back-btn"
          class="back-button"
          aria-label="Go back"
          hidden
        >
          ← Back
        </button>
        <div id="modal-dynamic-content" class="modal-body"></div>
      </div>
    </div>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
